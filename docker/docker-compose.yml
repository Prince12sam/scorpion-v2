services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: es_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: es
      POSTGRES_PASSWORD: es_dev_only
      POSTGRES_DB: es
    ports:
      - "55432:5432"
    volumes:
      - es_pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U es -d es"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  es_pg_data:
